# Mining Configuration
mining:
  # Search terms for gene editing
  search_terms:
    - "CRISPR"
    - "CRISPR-Cas9"
    - "prime editing"
    - "base editing"
    - "gene editing"
    - "genome editing"
    - "sgRNA"
    - "guide RNA"
    - "pegRNA"
    - "Cas9"
    - "Cas12"
    - "Cas13"
    - "off-target"
    - "on-target"
    - "gene therapy"
    - "therapeutic editing"

  # Date range for mining (1950-2025)
  date_range:
    start_year: 1950
    end_year: 2025

  # Quality thresholds
  quality:
    min_accuracy: 0.95
    min_confidence: 0.8
    require_doi: true
    require_abstract: true

  # Processing settings
  processing:
    max_concurrent_requests: 10
    batch_size: 100
    retry_attempts: 3
    timeout_seconds: 30

  # Storage settings
  storage:
    data_dir: "data"
    logs_dir: "logs"
    temp_dir: "temp"
    backup_interval_hours: 24

# Monitoring Configuration
monitoring:
  prometheus:
    enabled: true
    port: 9090

  grafana:
    enabled: true
    port: 3000

  alerts:
    email: ""  # For alert notifications
    slack_webhook: ""  # For Slack notifications

  metrics:
    collection_interval: 60  # seconds
    retention_days: 30

# Logging Configuration
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/genex_mining.log"
  max_size_mb: 100
  backup_count: 5

# Security Configuration
security:
  encryption:
    enabled: true
    algorithm: "AES-256-GCM"

  authentication:
    enabled: false  # For multi-user setups
    jwt_secret: ""  # Set for JWT authentication

  rate_limiting:
    enabled: true
    requests_per_minute: 1000
    burst_size: 100
