# GeneX Phase 1 Configuration
# Copy this file to config.yaml and add your API keys

# Database Configuration
database:
  postgresql:
    host: localhost
    port: 5432
    database: genex_mining
    username: genex_user
    password: ""  # Set your password
  mongodb:
    uri: "mongodb://localhost:27017/"
    database: genex_data
  redis:
    host: localhost
    port: 6379
    db: 0
  elasticsearch:
    hosts: ["localhost:9200"]
    index_prefix: "genex"

