# GeneX Mega Project - Revolutionary Configuration
# Phase 1 Complete Pipeline Configuration for All 11 Projects

# Project Information
project:
  name: "GeneX Mega Project"
  version: "1.0.0"
  phase: "Phase 1"
  description: "Revolutionary AI-powered gene editing research platform"
  target_diseases: [
    "Chronic granulomatous disease",
    "Huntington's disease repeat expansions",
    "Sickle cell anemia",
    "beta-thalassemia",
    "inherited blindness",
    "Duchenne muscular dystrophy",
    "hemophilia",
    "lysosomal diseases"
  ]

# API Configuration
api:
  # Rate limiting
  requests_per_second: 10
  max_retries: 3
  retry_delay: 1.0

  # Timeouts
  request_timeout: 30
  connection_timeout: 10

  # API Keys (set via environment variables)
  semantic_scholar_api_key: "${SEMANTIC_SCHOLAR_API_KEY}"
  encode_api_key: "${ENCODE_API_KEY}"
  geo_api_key: "${GEO_API_KEY}"
  uniprot_api_key: "${UNIPROT_API_KEY}"

  # Data sources
  data_sources: [
    "Semantic Scholar",
    "ENCODE",
    "UCSC",
    "GEO",
    "Ensembl",
    "UniProt",
    "PDB",
    "ClinicalTrials.gov",
    "PrimeVar",
    "BE-dataHIVE",
    "CRISPRdb",
    "CRISPRoffT"
  ]

# Knowledge Graph Configuration
knowledge_graph:
  # Neo4j settings
  neo4j_url: "bolt://localhost:7687"
  neo4j_user: "neo4j"
  neo4j_password: "password"
  use_neo4j: true

  # NetworkX fallback
  use_networkx_fallback: true

  # Processing
  batch_size: 1000
  real_time: true

  # Output paths
  output_path: "data/knowledge_graph"
  log_path: "logs/knowledge_graph.log"

# Massive Dataset Configuration
massive_datasets:
  # CRISPR Dataset (Project 4)
  crispr:
    target_samples: 1000000
    target_features: 1000
    feature_categories:
      guide_rna: 250
      cas_protein: 200
      target_site: 200
      experimental_variables: 200
      outcomes: 150

  # Prime Editing Dataset (Project 5)
  prime_editing:
    target_samples: 1000000
    target_features: 1000
    feature_categories:
      pegRNA_design: 200
      efficiency_metrics: 150
      safety_profiles: 100
      clinical_relevance: 100
      experimental_conditions: 200
      outcomes: 250

  # Base Editing Dataset (Project 6)
  base_editing:
    target_samples: 500000
    target_features: 1000
    feature_categories:
      editor_characteristics: 150
      target_analysis: 200
      editing_outcomes: 200
      safety_assessment: 150
      experimental_conditions: 150
      clinical_data: 150

  # Output paths
  output_path: "data/massive_datasets"

# Literature Intelligence Configuration
literature_intelligence:
  # Data sources
  data_sources: [
    "PubMed",
    "Semantic Scholar",
    "arXiv",
    "bioRxiv",
    "medRxiv",
    "Nature",
    "Science",
    "Cell",
    "Nature Biotechnology",
    "Nature Methods",
    "Genome Biology",
    "Nucleic Acids Research",
    "Molecular Cell"
  ]

  # Processing parameters
  max_papers_per_query: 1000
  processing_batch_size: 100
  real_time_update_interval: 3600  # seconds

  # AI model parameters
  model_name: "microsoft/DialoGPT-medium"
  summarization_model: "facebook/bart-large-cnn"
  entity_extraction_model: "allenai/scibert_scivocab_uncased"

  # Output paths
  output_path: "data/literature_intelligence"
  knowledge_graph_path: "data/knowledge_graph"

  # Journal templates
  journal_templates:
    Nature: "templates/nature_template.tex"
    Science: "templates/science_template.tex"
    Cell: "templates/cell_template.tex"
    "Nature Biotechnology": "templates/nature_biotech_template.tex"
    "Nature Methods": "templates/nature_methods_template.tex"

# Project-Specific Configurations
projects:
  # Project 1: GeneX Prime
  project_1:
    name: "GeneX Prime"
    objective: "Develop world's most advanced prime editing system with >85% efficiency prediction accuracy"
    target_diseases: ["Chronic granulomatous disease", "Huntington's disease repeat expansions"]
    data_sources: ["PrimeVar database (68,500+ pathogenic variants)", "2019-2025 literature"]
    required_fields: ["pegRNA_sequence", "efficiency_prediction", "safety_score", "clinical_relevance"]
    validation_rules:
      efficiency_prediction:
        min: 0.0
        max: 1.0
      safety_score:
        min: 0.0
        max: 1.0
      pegRNA_length:
        min: 20
        max: 200

  # Project 2: GeneX Base
  project_2:
    name: "GeneX Base"
    objective: "Create ultra-precise base editors with >90% safety prediction accuracy"
    target_diseases: ["Sickle cell anemia", "beta-thalassemia", "inherited blindness"]
    data_sources: ["BE-dataHIVE (460,000+ base editing combinations)"]
    required_fields: ["editor_type", "target_sequence", "safety_prediction", "editing_efficiency"]
    validation_rules:
      safety_prediction:
        min: 0.0
        max: 1.0
      editing_efficiency:
        min: 0.0
        max: 1.0

  # Project 3: GeneX CRISPR
  project_3:
    name: "GeneX CRISPR"
    objective: "Develop next-generation CRISPR systems with unparalleled specificity"
    target_diseases: ["Duchenne muscular dystrophy", "hemophilia", "lysosomal diseases"]
    data_sources: ["CRISPRdb (8,069 bacterial genomes)", "CRISPRoffT (226,164 guide-target pairs)"]
    required_fields: ["cas_type", "guide_sequence", "on_target_efficiency", "specificity_score"]
    validation_rules:
      on_target_efficiency:
        min: 0.0
        max: 1.0
      specificity_score:
        min: 0.0
        max: 1.0

  # Project 4: CRISPR Comprehensive Dataset
  project_4:
    name: "CRISPR Comprehensive Dataset"
    objective: "Generate 1,000,000+ validated CRISPR samples with 1000+ features each"
    feature_categories:
      guide_rna: 250
      cas_protein: 200
      target_site: 200
      experimental_variables: 200
      outcomes: 150
    required_fields: ["guide_sequence", "cas_type", "target_site", "efficiency", "off_target_count"]
    validation_rules:
      efficiency:
        min: 0.0
        max: 1.0
      off_target_count:
        min: 0
        max: 1000

  # Project 5: Prime Editing Comprehensive Dataset
  project_5:
    name: "Prime Editing Comprehensive Dataset"
    objective: "Generate 1,000,000+ validated Prime Editing samples (2019-2025 focus)"
    feature_categories:
      pegRNA_design: 200
      efficiency_metrics: 150
      safety_profiles: 100
      clinical_relevance: 100
      experimental_conditions: 200
      outcomes: 250
    required_fields: ["pegRNA_sequence", "efficiency_metric", "safety_profile", "clinical_relevance"]
    validation_rules:
      efficiency_metric:
        min: 0.0
        max: 1.0
      safety_profile:
        min: 0.0
        max: 1.0

  # Project 6: Base Editing Comprehensive Dataset
  project_6:
    name: "Base Editing Comprehensive Dataset"
    objective: "Generate 500,000+ validated base editing samples (CBE/ABE systems)"
    feature_categories:
      editor_characteristics: 150
      target_analysis: 200
      editing_outcomes: 200
      safety_assessment: 150
      experimental_conditions: 150
      clinical_data: 150
    required_fields: ["editor_type", "target_sequence", "editing_outcome", "safety_assessment"]
    validation_rules:
      editing_outcome:
        min: 0.0
        max: 1.0
      safety_assessment:
        min: 0.0
        max: 1.0

  # Project 7: CRISPR Literature Intelligence
  project_7:
    name: "CRISPR Literature Intelligence"
    objective: "Comprehensive analysis of CRISPR literature (1950-2025) with automated manuscript generation"
    scope: "100,000+ CRISPR publications, real-time monitoring, clinical applications analysis"
    output_journals: ["Nature", "Science", "Cell", "PNAS", "NEJM"]
    required_fields: ["publication_date", "title", "abstract", "authors", "journal", "citations"]
    validation_rules:
      publication_date:
        min: 1950
        max: 2025
      citations:
        min: 0
        max: 100000

  # Project 8: Prime Editing Literature Intelligence
  project_8:
    name: "Prime Editing Literature Intelligence"
    objective: "Comprehensive Prime Editing analysis (2019-2025) with automated manuscript generation"
    scope: "PE1→PE2→PE3 evolution, mechanism elucidation, clinical translation analysis"
    output_types: ["Technology development papers", "Mechanism studies", "Clinical translation reports"]
    required_fields: ["pe_system", "evolution_stage", "mechanism_details", "clinical_translation"]
    validation_rules:
      publication_date:
        min: 2019
        max: 2025

  # Project 9: Base Editing Literature Intelligence
  project_9:
    name: "Base Editing Literature Intelligence"
    objective: "Complete base editing literature analysis (2016-2025) with automated manuscript generation"
    scope: "David Liu's foundational work, CBE1→CBE4 evolution, clinical applications"
    output_types: ["Safety profile studies", "Clinical application reviews", "Technology evolution analysis"]
    required_fields: ["editor_evolution", "foundational_work", "clinical_applications"]
    validation_rules:
      publication_date:
        min: 2016
        max: 2025

  # Project 10: Master Gene Editing Literature Intelligence
  project_10:
    name: "Master Gene Editing Literature Intelligence"
    objective: "Unified analysis platform for ALL gene editing technologies with cross-technology insights"
    scope: "CRISPR + Prime Editing + Base Editing convergence analysis, market intelligence, regulatory evolution"
    output_types: ["Comprehensive review papers", "Cross-technology comparisons", "Future direction predictions"]
    required_fields: ["technology_convergence", "market_intelligence", "regulatory_evolution"]
    validation_rules: {}

  # Project 11: GeneX Comprehensive Knowledge Base
  project_11:
    name: "GeneX Comprehensive Knowledge Base"
    objective: "World's most advanced real-time knowledge discovery platform for gene editing"
    scope: "24/7 monitoring of 100+ data sources, 5000+ papers/hour processing, Neo4j knowledge graph"
    output_types: ["Real-time manuscript generation", "Dynamic content integration", "Predictive manuscript generation"]
    required_fields: ["data_source", "processing_timestamp", "knowledge_entity", "relationship"]
    validation_rules:
      processing_timestamp:
        format: "ISO8601"

# Data Source Schemas
data_sources:
  PrimeVar:
    description: "Database with 68,500+ pathogenic variants"
    fields: ["variant_id", "gene", "disease", "pathogenicity_score", "clinical_significance"]
    validation_rules:
      pathogenicity_score:
        min: 0.0
        max: 1.0

  BE_dataHIVE:
    description: "460,000+ base editing combinations"
    fields: ["editor_id", "target_sequence", "editing_efficiency", "safety_metrics"]
    validation_rules:
      editing_efficiency:
        min: 0.0
        max: 1.0

  CRISPRdb:
    description: "8,069 bacterial genomes"
    fields: ["genome_id", "cas_system", "spacer_sequences", "pam_sequences"]
    validation_rules: {}

  CRISPRoffT:
    description: "226,164 guide-target pairs"
    fields: ["guide_id", "target_id", "efficiency_score", "specificity_score"]
    validation_rules:
      efficiency_score:
        min: 0.0
        max: 1.0
      specificity_score:
        min: 0.0
        max: 1.0

# System Configuration
system:
  # Logging
  log_level: "INFO"
  log_dir: "logs"

  # Output directories
  output_dirs:
    data: "data"
    results: "results"
    cache: "cache"
    templates: "templates"

  # Performance
  max_workers: 4
  memory_limit_gb: 16

  # HPC settings
  hpc:
    enabled: false
    queue: "default"
    wall_time: "24:00:00"
    memory_per_core: "4GB"
    cores_per_node: 4

# Revolutionary AI Architecture Settings
revolutionary_ai:
  # Multimodal Integration
  multimodal:
    enabled: true
    modalities: ["sequence", "structure", "expression", "clinical"]
    fusion_method: "attention"

  # Neural Architecture Search
  nas:
    enabled: true
    search_space: "biological"
    optimization_metric: "accuracy"
    max_trials: 100

  # Graph Neural Networks
  gnn:
    enabled: true
    architecture: "graph_transformer"
    layers: 6
    hidden_dim: 256

  # Reinforcement Learning
  rl:
    enabled: true
    algorithm: "PPO"
    environment: "experimental_optimization"

  # Federated Learning
  federated:
    enabled: false
    participants: 10
    privacy_budget: 1.0
